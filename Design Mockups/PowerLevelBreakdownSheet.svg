<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 392" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="360" height="392" fill="#0a0a0a"/>
