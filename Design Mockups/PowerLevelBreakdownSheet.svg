  <text x="80" y="82" fill="#e5e5e5" font-size="22" font-weight="600">14,150</text>
  <text x="172" y="82" fill="#737373" font-size="13">avg volume</text>
  <text x="80" y="104" fill="#737373" font-size="13">+14% vs prior 30 days</text>

  <rect x="32" y="132" width="96" height="8" rx="4" fill="#ef4444"/>
